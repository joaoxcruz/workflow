name: Java CI with Maven

on:
  push:
    branches: [ main ] # Trigger on pushes to the main branch
  pull_request:
    branches: [ main ] # Trigger on pull requests targeting the main branch

jobs:
  build:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Checks out your code

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'        # Specify Java 11, matching your pom.xml
        distribution: 'temurin'   # Use Eclipse Temurin distribution (a popular choice)
        cache: maven              # Enable caching for Maven dependencies

    - name: Make Maven wrapper executable
      run: chmod +x mvnw          # Grant execute permission to the wrapper script on Linux

    - name: Build and Test with Maven
      # Run 'verify' which compiles, runs tests, packages, and runs integration tests/checks
      # -B runs in batch mode (non-interactive)
      run: ./mvnw -B verify

    # Optional: Upload JaCoCo coverage reports
