# FILENAME: .github/workflows/java-maven-ci.yml
name: Java CI with Maven

on:
  push:
    branches: [ "main" ] # Or your default branch
  pull_request:
    branches: [ "main" ] # Or your default branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      # --- ADD THIS STEP ---
      - name: Grant execute permission for mvnw
        run: chmod +x ./mvnw
      # --- END OF ADDED STEP ---

      - name: Build, Test, and Verify with Maven Wrapper
        # Now this step should have permission to execute ./mvnw
        run: ./mvnw -B verify

      - name: Upload Unit Test Results (Surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload Code Coverage Report (Jacoco Aggregate)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-code-coverage-report
          path: shodrone.util.ci/target/site/jacoco-aggregate/
          retention-days: 7