# FILENAME: .github/workflows/java-maven-ci.yml
name: Java CI with Maven

on:
  push:
    branches: [ "main" ] # Or your default branch
  pull_request:
    branches: [ "main" ] # Or your default branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Use latest checkout action

      - name: Set up JDK 11
        uses: actions/setup-java@v4 # Use latest setup-java action
        with:
          java-version: '11'
          distribution: 'temurin' # Or 'adopt', 'zulu', etc.
          cache: 'maven' # Enable caching of Maven dependencies

      - name: Build, Test, and Verify with Maven Wrapper
        # Run the verify phase, which includes compile, test, package, and integration-test checks
        # -B runs in batch mode (non-interactive)
        # Use the Maven Wrapper script to ensure consistent Maven version
        run: ./mvnw -B verify

      - name: Upload Unit Test Results (Surefire)
        if: always() # Always run this step to upload results even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml' # Upload XML reports from all modules
          retention-days: 7 # Keep artifacts for 7 days

      - name: Upload Code Coverage Report (Jacoco Aggregate)
        if: success() # Only upload coverage if build succeeds
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-code-coverage-report
          path: shodrone.util.ci/target/site/jacoco-aggregate/ # Path to the aggregated HTML report
          retention-days: 7 # Keep artifacts for 7 days